<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlex | Iniciar Sesión</title>
    <link rel="stylesheet" href="inicio.css">
</head>
<body>

    <!-- Imagen de fondo que cubre toda la pantalla -->
    <img src="./peliculas/interface-streaming-service-website-online-260nw-2301494483.webp" alt="Fondo CineFlex" class="background-img">
    <div class="overlay"></div>

    <!-- Encabezado / Logo -->
    <header class="header">
        <div class="logo-container">
            <h1 class="logo">Cine<span>Flex</span></h1>
        </div>
    </header>

    <!-- Contenedor del Formulario -->
    <main class="login-container">
        <div class="login-card">
            <h2>Inicia sesión</h2>

            <!-- Redirige a inicio.html al enviar el formulario -->
            <form action="inicio.html" method="GET" class="login-form">
                <div class="input-group">
                    <input type="text" placeholder="Email o número de teléfono" required>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn-submit">Iniciar sesión</button>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Recuérdame
                    </label>
                    <a href="#" class="help-link">¿Necesitas ayuda?</a>
                </div>
            </form>

            <div class="signup-section">
                <p>¿Primera vez en CineFlex? <a href="#">Suscríbete ahora</a></p>
            </div>
        </div>
    </main>

</body>
</html>
