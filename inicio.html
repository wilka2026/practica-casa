<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlex | Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="inicio.css">
</head>
<body>

    <!-- Fondo superpuesto y barra superior / Logo -->
    <div class="login-wrapper">
        <header class="login-header">
            <a href="index.html" class="logo">Cine<span>Flex</span></a>
        </header>

        <!-- Formulario de Inicio de Sesión -->
        <main class="login-container">
            <div class="login-box">
                <h2>Inicia sesión</h2>
                
                <form action="index.html" method="GET">
                    <div class="input-group-custom">
                        <input type="text" id="email" required placeholder=" ">
                        <label for="email">Email o número de teléfono</label>
                    </div>

                    <div class="input-group-custom">
                        <input type="password" id="password" required placeholder=" ">
                        <label for="password">Contraseña</label>
                    </div>

                    <button type="submit" class="btn-login">Iniciar sesión</button>

                    <div class="login-help">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe" checked>
                            <label class="form-check-label" for="rememberMe">Recuérdame</label>
                        </div>
                        <a href="#" class="help-link">¿Necesitas ayuda?</a>
                    </div>
                </form>

                <div class="login-footer">
                    <p class="signup-text">
                        ¿Primera vez en CineFlex? <a href="#">Suscríbete ahora</a>.
                    </p>
                  
                </div>
            </div>
        </main>

        <!-- Footer estilizado -->
        <footer class="login-site-footer">
            <div class="container">
                <p>¿Preguntas? Llama al 01-800-000-0000</p>
                <div class="footer-links">
                    <a href="#">Preguntas frecuentes</a>
                    <a href="#">Centro de ayuda</a>
                    <a href="#">Términos de uso</a>
                    <a href="#">Privacidad</a>
                    <a href="#">Preferencias de cookies</a>
                    <a href="#">Información corporativa</a>
                </div>
            </div>
        </footer>
    </div>

</body>
</html>
